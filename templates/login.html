{% extends 'base.html' %}

{% block title %}Login - Crop Yield Prediction{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header" style="background-color: var(--main-color); color: white;">
                <h3 class="mb-0">Login</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" id="id_username" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="background-color: var(--main-color); border-color: var(--main-color);">Login</button>
                </form>
                <div class="mt-3">
                    <p>Don't have an account? <a href="{% url 'signup' %}" style="color: var(--main-color);">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
